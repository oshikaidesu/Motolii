[package]
name = "timeline-bench"
version = "0.1.0"
edition = "2021"

# ルートworkspaceから隔離。wgpu 29は本体と同一メジャー。
[workspace]

[dependencies]
wgpu = "29"
motolii-gpu = { path = "../../crates/motolii-gpu" }
bytemuck = { version = "1", features = ["derive"] }
pollster = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
image = { version = "0.25", default-features = false, features = ["png"] }
