[workspace]
resolver = "2"
members = [
    "crates/oc-core",
    "crates/oc-eval",
    "crates/oc-media",
    "crates/oc-gpu",
]

[workspace.package]
edition = "2021"
license = "MIT"
repository = "https://github.com/oshikaidesu/p5.opencuts"

[workspace.dependencies]
oc-core = { path = "crates/oc-core" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
