[workspace]
resolver = "2"
members = [
    "crates/oc-core",
    "crates/oc-eval",
    "crates/oc-nodes",
    "crates/oc-plugin",
    "crates/oc-render",
    "crates/oc-export",
    "crates/oc-cli",
    "crates/oc-testkit",
    "crates/oc-media",
    "crates/oc-gpu",
]

[workspace.package]
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/oshikaidesu/p5.opencuts"

[workspace.dependencies]
oc-core = { path = "crates/oc-core" }
oc-eval = { path = "crates/oc-eval" }
oc-gpu = { path = "crates/oc-gpu" }
oc-media = { path = "crates/oc-media" }
oc-nodes = { path = "crates/oc-nodes" }
oc-plugin = { path = "crates/oc-plugin" }
oc-render = { path = "crates/oc-render" }
oc-export = { path = "crates/oc-export" }
oc-cli = { path = "crates/oc-cli" }
oc-testkit = { path = "crates/oc-testkit" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
image = { version = "0.25", default-features = false, features = ["png"] }
# Slintのwgpu統合(unstable-wgpu-29)と同一メジャーに固定する。
# wgpuの更新はSlint側の対応更新に合わせてまとめて行う(落とし穴A-3改訂)。
wgpu = "29"
