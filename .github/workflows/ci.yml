name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # M2E-1: CIでは環境依存テスト(GPU/ffmpeg)の無音スキップを禁止する。
  # 依存が欠けると gpu_or_skip がpanicし、カナリア(motolii-testkit/tests/
  # skip_policy.rs)が赤になる。ローカル開発機ではこの変数を設定しない。
  MOTOLII_REQUIRE_GPU: "1"

jobs:
  test:
    # M2E-3: ubuntu-latest 追随で lavapipe/ffmpeg が黙って更新されると
    # tolerance 0/1 のゴールデンが全赤になる。runner をピン留めする。
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # merge-base が取れるよう履歴を確保(D1i-4 / M2E-2 ゲートの fail-closed 前提)
          fetch-depth: 0
      - name: Install ffmpeg + software Vulkan + ALSA/fontconfig headers
        run: |
          # The runner's third-party Microsoft apt repo intermittently serves
          # an invalid InRelease, which makes `apt-get update` exit non-zero.
          # Drop any source that points at packages.microsoft.com so the update
          # stays clean; the ffmpeg/mesa packages come from the Ubuntu repos.
          sudo find /etc/apt/sources.list.d -type f \
            \( -name '*.list' -o -name '*.sources' \) \
            -exec grep -lq 'packages.microsoft.com' {} \; -delete || true
          sudo apt-get update
          # libasound2-dev: cpal(alsa-sys)のビルドに必要(D4)。実デバイスは不要 —
          # D4のハードウェア再生テストは#[ignore]で既定スキップ、デコード/リング/
          # シミュレーション再生は常時緑(motolii-audio/tests/device_smoke.rs参照)。
          # libfontconfig1-dev: SlintのLinux文字描画依存をCIでビルドするために必要。
          sudo apt-get install -y ffmpeg mesa-vulkan-drivers libasound2-dev libfontconfig1-dev
      - name: Log mesa/ffmpeg/alsa/fontconfig versions (M2E-3 drift triage)
        run: |
          # 不変条件の証明ではなく、ドリフト時の一次切り分け用。
          ffmpeg -version
          dpkg -s mesa-vulkan-drivers
          dpkg -s libasound2-dev
          dpkg -s libfontconfig1-dev
      - name: Rust toolchain
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
      - name: M2E-2 protected test assets × src simultaneous change gate
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags origin "${{ github.base_ref }}"
          BASE="origin/${{ github.base_ref }}"
          # ブートストラップPR(保護領域がbaseに無い)ではliveゲートをスキップ。
          # 負例は cargo test -p motolii-testkit --test protected_assets が常時カバーする。
          if git cat-file -e "$BASE:crates/motolii-testkit/src/cpu_reference/mod.rs" 2>/dev/null; then
            ./scripts/check-protected-diff.sh "$BASE"
          else
            echo "M2E-2 bootstrap: protected paths absent on $BASE; skip live gate"
          fi
      - name: D1i-4 semantic golden update forbid (S16)
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags origin "${{ github.base_ref }}"
          BASE="origin/${{ github.base_ref }}"
          # merge-base 失敗はスクリプト側で fail-closed。浅掘り回避は checkout fetch-depth: 0。
          ./scripts/check-golden-update-policy.sh "$BASE"
      - name: M3E-1 slint dependency direction gate
        run: ./scripts/check-slint-deps.sh
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        # M2E-3: Cargo.lock と乖離した解決を禁止し、依存ドリフトを検知する。
        run: cargo test --locked --workspace
